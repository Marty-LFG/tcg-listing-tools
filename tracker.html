<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Tracker · Binders Keepers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0b0f;--bg2:#0d0f15;--panel:#14171f;--panel2:#1b1f2a;--ink:#0b0d12;
    --line:rgba(255,255,255,.075);--line2:rgba(255,255,255,.13);
    --text:#e9edf6;--muted:#8b93a6;--faint:#5b6373;
    --gold:#d4b072;--gold-soft:rgba(212,176,114,.14);--field:#0b0d12;
    --green:#43d6a0;--red:#f0666e;--amber:#f0c04a;--blue:#6ab0ff;
    --shadow:0 12px 34px -14px rgba(0,0,0,.72);
    --serif:'Fraunces',Georgia,serif;--sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  body{margin:0;color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;padding:30px 24px 72px;min-height:100vh;
    background:radial-gradient(1200px 620px at 12% -12%,rgba(212,176,114,.07),transparent 60%),radial-gradient(1000px 560px at 112% -6%,rgba(106,176,255,.055),transparent 55%),linear-gradient(180deg,#0b0d12,#08090d 62%);background-attachment:fixed;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.55;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:46px 46px;-webkit-mask-image:radial-gradient(circle at 50% 12%,#000,transparent 82%);mask-image:radial-gradient(circle at 50% 12%,#000,transparent 82%);}
  .wrap{max-width:1120px;margin:0 auto;position:relative;z-index:1;}
  a{color:var(--gold);text-decoration:none;} a:hover{text-decoration:underline;text-underline-offset:3px;}
  code{font-family:var(--mono);background:rgba(212,176,114,.1);border:1px solid rgba(212,176,114,.25);padding:1px 6px;border-radius:6px;color:var(--gold);font-size:.9em;}
  /* masthead */
  .mast{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;padding-bottom:20px;margin-bottom:24px;border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:15px;}
  .monogram{width:48px;height:48px;flex:none;border-radius:13px;border:1px solid var(--line2);background:linear-gradient(160deg,#1e2432,#111420);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:inset 0 1px 0 rgba(255,255,255,.07),var(--shadow);}
  h1{font-family:var(--serif);font-weight:600;font-size:28px;letter-spacing:-.015em;margin:0;line-height:1.02;}
  h1 .thin{color:var(--muted);font-weight:400;font-style:italic;}
  .sub{color:var(--muted);font-size:12px;margin:6px 0 0;font-family:var(--mono);}
  .sub .dot{color:var(--faint);margin:0 7px;}
  /* buttons */
  .btn{font-family:var(--sans);padding:9px 15px;border:1px solid var(--line2);background:rgba(255,255,255,.025);color:var(--text);border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:.16s ease;}
  .btn:hover{border-color:var(--gold);background:var(--gold-soft);transform:translateY(-1px);}
  .btn.sm{padding:6px 10px;font-size:11.5px;border-radius:8px;}
  .btn.ghost{border-color:var(--line);color:var(--muted);background:transparent;}
  .btn.ghost:hover{color:var(--text);border-color:var(--line2);}
  .btn.danger{border-color:rgba(240,102,110,.38);color:var(--red);background:rgba(240,102,110,.06);}
  .btn.danger:hover{background:rgba(240,102,110,.14);border-color:var(--red);}
  .btn.go{border-color:rgba(67,214,160,.45);color:var(--green);background:rgba(67,214,160,.09);}
  .btn.go:hover{background:rgba(67,214,160,.17);border-color:var(--green);}
  .banner{font-size:12.5px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin:14px 0;}
  .banner.warn{border-color:rgba(240,192,74,.4);color:var(--amber);background:rgba(240,192,74,.05);}
  .sec{margin-top:28px;}
  .sec-h{font-family:var(--sans);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
  .count{font-family:var(--mono);background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:999px;padding:1px 9px;font-size:11px;color:var(--text);}
  .empty{color:var(--muted);font-size:13px;padding:20px;text-align:center;border:1px dashed var(--line);border-radius:14px;background:rgba(255,255,255,.012);}
  select,input,textarea{background:var(--ink);border:1px solid var(--line2);border-radius:9px;color:var(--text);padding:8px 10px;font-size:13px;font-family:var(--sans);transition:.15s;}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft);}
  input::placeholder{color:var(--faint);}
  .card{position:relative;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,var(--panel),var(--bg2));padding:15px 17px 15px 20px;margin-bottom:12px;box-shadow:var(--shadow);transition:.18s ease;animation:rise .45s both;}
  .card:hover{border-color:var(--line2);transform:translateY(-1px);}
  .card::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:0 3px 3px 0;background:var(--gold);opacity:.35;}
  .row{display:flex;gap:16px;align-items:center;justify-content:space-between;flex-wrap:wrap;}
  .nm{font-family:var(--sans);font-weight:600;font-size:15.5px;letter-spacing:-.005em;}
  .key{color:var(--muted);font-size:12px;font-family:var(--mono);margin-top:3px;}
  .tag{font-family:var(--sans);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;border:1px solid var(--line2);border-radius:999px;padding:2px 8px;color:var(--muted);}
  .tag.claude{border-color:rgba(106,176,255,.4);color:var(--blue);background:rgba(106,176,255,.07);}
  .tag.pending{border-color:rgba(240,192,74,.5);color:var(--amber);background:rgba(240,192,74,.08);}
  .price{font-family:var(--mono);font-weight:600;font-size:16px;letter-spacing:-.02em;}
  .price small{color:var(--muted);font-weight:400;font-size:12px;}
  .badge{font-family:var(--mono);font-size:12px;font-weight:600;border-radius:8px;padding:2px 8px;border:1px solid var(--line2);}
  .up{color:var(--green);border-color:rgba(67,214,160,.35);background:rgba(67,214,160,.08);}
  .down{color:var(--red);border-color:rgba(240,102,110,.35);background:rgba(240,102,110,.08);}
  .flat{color:var(--muted);}
  .spark{width:120px;flex:none;opacity:.9;}
  .sig{position:relative;border:1px solid var(--line);border-left:3px solid var(--line2);padding:12px 15px;margin-bottom:9px;background:linear-gradient(180deg,var(--panel),var(--bg2));border-radius:12px;box-shadow:var(--shadow);animation:rise .4s both;}
  .sig.opportunity{border-left-color:var(--green);}
  .sig.downtrend{border-left-color:var(--red);}
  .sig.momentum{border-left-color:var(--gold);}
  .sig .msg{font-weight:600;font-size:13.5px;}
  .sig .meta{color:var(--muted);font-size:11.5px;margin-top:3px;font-family:var(--mono);}
  .group-h{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--gold);margin:20px 0 10px;}
  .qa{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:11px 13px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,var(--panel),var(--bg2));}
  .qa .sec-h{margin:0;color:var(--gold);}
  .note{color:var(--muted);font-size:12px;margin-top:8px;}
  .err{color:var(--amber);font-size:11.5px;margin-top:4px;font-family:var(--mono);}
  @keyframes rise{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  ::-webkit-scrollbar{width:11px;height:11px;} ::-webkit-scrollbar-thumb{background:#20242e;border-radius:8px;border:2px solid transparent;background-clip:padding-box;} ::-webkit-scrollbar-thumb:hover{background:#2c3140;background-clip:padding-box;}
</style>
</head>
<body>
<div class="wrap">
  <header class="mast">
    <div class="brand">
      <div class="monogram">💹</div>
      <div>
        <h1>Price Tracker</h1>
        <p class="sub"><a href="/">← all tools</a><span class="dot">·</span>cached prices, trends &amp; opportunities<span class="dot">·</span><span id="updated">—</span></p>
      </div>
    </div>
    <div style="display:flex;gap:9px;">
      <button class="btn" onclick="refreshAll(this)">↻ Refresh all</button>
    </div>
  </header>

  <div id="banner"></div>

  <div class="sec">
    <div class="qa">
      <span class="sec-h" style="margin:0;">Quick add</span>
      <select id="qa_game"><option value="riftbound">Riftbound</option><option value="mtg">MTG</option><option value="pokemon">Pokémon</option><option value="swu">SWU</option></select>
      <input id="qa_key" placeholder="identity key (e.g. neo-1)" style="width:170px;">
      <input id="qa_name" placeholder="name" style="width:170px;">
      <input id="qa_variant" placeholder="variant (optional)" style="width:140px;">
      <button class="btn sm" onclick="quickAdd(this)">+ Track</button>
    </div>
    <div class="note">Mostly you'll add cards from a listing builder (the “Add to tracker” button). Identity keys: Riftbound <code>OGN-296</code>, MTG <code>neo-1</code>, Pokémon <code>sv4-25</code>, SWU <code>sor/010</code>.</div>
  </div>

  <div class="sec" id="opps"></div>
  <div class="sec" id="downs"></div>
  <div class="sec" id="moms"></div>
  <div class="sec" id="review"></div>
  <div class="sec" id="all"></div>
</div>

<script src="/extras.js"></script>
<script>
const B='/api/tracker';
const GAME_NAMES={riftbound:'Riftbound',mtg:'Magic: The Gathering',pokemon:'Pokémon',swu:'Star Wars: Unlimited'};
let CFG=null;

function api(path,opts){return fetch(B+path,opts).then(r=>r.ok?r.json():Promise.reject(r));}
function aud(n){return n==null?'—':'A$'+(Math.round(n*100)/100).toFixed(2);}
function usd(n,cur){const s={USD:'US$',EUR:'€',GBP:'£',AUD:'A$'}[cur]||(cur+' ');return n==null?'—':s+(Math.round(n*100)/100).toFixed(2);}
function esc(s){return (''+(s==null?'':s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// % change over N days from a sparkline series [{daysAgo,price}] (sorted asc by ts).
function pctOver(series,days){
  if(!series||series.length<2)return null;
  const now=series[series.length-1].price;
  // most recent point at least `days` old
  let base=null;
  for(const p of series){ if(p.daysAgo>=days){ base=p.price; } }
  if(base==null||!(base>0))return null;
  return (now-base)/base*100;
}
function trendBadge(card,win){
  let pct=null;
  if(card.game==='riftbound'&&card.latest){ pct=win===7?card.latest.pct_7d:card.latest.pct_30d; }
  if(pct==null) pct=pctOver(card.spark,win);
  if(pct==null) return '<span class="badge flat">'+win+'d —</span>';
  const cls=pct>0.5?'up':pct<-0.5?'down':'flat';
  const sign=pct>0?'+':'';
  return '<span class="badge '+cls+'">'+win+'d '+sign+(Math.round(pct*10)/10)+'%</span>';
}
function sparkHtml(card){
  const s=(card.spark||[]).filter(p=>p.price!=null);
  if(s.length<2) return '<div class="spark" style="color:var(--muted);font-size:11px;">no history yet</div>';
  return '<div class="spark">'+(window.TCG?TCG.lineGraph(s):'')+'</div>';
}

function cardRow(card){
  const L=card.latest;
  const native=L?usd(L.market,L.currency):'—';
  const a=L?aud(L.market_aud):'—';
  const SRC={pokemontcg:'TCGplayer',scryfall:'Scryfall',swudb:'swu-db',scrydex:'Scrydex',ebay:'eBay fair value',user:'manual',claude:'claude'};
  const srcMeta=L?('<div style="font-size:10.5px;color:var(--muted);margin-top:3px;"><span style="border:1px solid var(--line);border-radius:5px;padding:0 5px;">'+esc(SRC[L.source]||L.source||'source ?')+'</span>'+(card.count?' · '+card.count+' snapshot'+(card.count>1?'s':''):'')+(L.ts?' · as of '+esc((''+L.ts).slice(0,10)):'')+'</div>'):'';
  const tags=[];
  if(card.source==='claude')tags.push('<span class="tag claude">claude</span>');
  if(card.review_status==='pending')tags.push('<span class="tag pending">pending review</span>');
  const errs={scrydex_unauthorized:'Scrydex key invalid/expired — no price',scrydex_inactive:'Scrydex subscription inactive — activate a plan to get prices',no_price:'no price from source',http_404:'not found at source'};
  const err=card.last_error?('<div class="err">⚠ '+(errs[card.last_error]||card.last_error)+'</div>'):'';
  return '<div class="card"><div class="row">'
    +'<div style="min-width:200px;flex:1;">'
      +'<div class="nm">'+esc(card.name)+' '+tags.join(' ')+'</div>'
      +'<div class="key">'+esc(card.game)+' · '+esc(card.identity_key)+(card.variant?' · '+esc(card.variant):'')+'</div>'
      +srcMeta
      +(card.note?'<div class="note">'+esc(card.note)+'</div>':'')+err
    +'</div>'
    +sparkHtml(card)
    +'<div style="text-align:right;">'
      +'<div class="price">'+a+(L&&L.market_aud!=null?' <small>'+native+'</small>':'')+'</div>'
      +'<div style="margin-top:5px;display:flex;gap:5px;justify-content:flex-end;">'+trendBadge(card,7)+trendBadge(card,30)+'</div>'
    +'</div>'
    +'<div style="display:flex;gap:6px;">'
      +'<button class="btn sm ghost" onclick="refreshOne('+card.id+',this)">↻</button>'
      +'<button class="btn sm danger" onclick="removeCard('+card.id+')">Remove</button>'
    +'</div>'
  +'</div></div>';
}

function sigBlock(s){
  return '<div class="sig '+s.kind+'"><div class="msg">'+esc(s.message||s.name)+'</div>'
    +'<div class="meta">'+esc(GAME_NAMES[s.game]||s.game)+' · '+esc(s.identity_key)+' · '+esc(s.ts)
    +' <button class="btn sm ghost" style="margin-left:6px;" onclick="ackSig('+s.id+')">dismiss</button></div></div>';
}

function section(elId,title,items,renderer,emptyMsg){
  const el=document.getElementById(elId);
  el.innerHTML='<div class="sec-h">'+title+' <span class="count">'+items.length+'</span></div>'
    +(items.length?items.map(renderer).join(''):'<div class="empty">'+emptyMsg+'</div>');
}

async function load(){
  try{ CFG=await api('/config'); }catch(e){ CFG=null; }
  document.getElementById('updated').textContent='loaded '+new Date().toLocaleTimeString();
  // banner
  let banner='';
  if(CFG&&!CFG.scrydex_enabled) banner='<div class="banner warn">Scrydex key not set — Riftbound cards will track without prices. Add SCRYDEX_API_KEY + SCRYDEX_TEAM_ID to .env.</div>';
  document.getElementById('banner').innerHTML=banner;

  const [{cards},{signals}]=await Promise.all([api('/watchlist'),api('/signals?unacked=1')]);
  const byKind=k=>signals.filter(s=>s.kind===k);
  section('opps','🟢 Buy opportunities',byKind('opportunity'),sigBlock,'No opportunities right now.');
  section('downs','🔻 Downtrends (cards you hold)',byKind('downtrend'),sigBlock,'Nothing you hold is sliding.');
  section('moms','🚀 Momentum',byKind('momentum'),sigBlock,'No strong risers.');

  const pending=cards.filter(c=>c.review_status==='pending');
  section('review','🔎 Review queue (Claude-added)',pending,
    c=>'<div class="card"><div class="row"><div style="flex:1;min-width:220px;"><div class="nm">'+esc(c.name)+' <span class="tag claude">claude</span></div>'
      +'<div class="key">'+esc(c.game)+' · '+esc(c.identity_key)+'</div>'+(c.note?'<div class="note">'+esc(c.note)+'</div>':'')+'</div>'
      +'<div style="display:flex;gap:6px;"><button class="btn sm go" onclick="approve('+c.id+')">Approve</button>'
      +'<button class="btn sm danger" onclick="removeCard('+c.id+',true)">Reject</button></div></div></div>',
    'No cards awaiting review.');

  // all tracked, grouped by game
  const allEl=document.getElementById('all');
  let html='<div class="sec-h">All tracked <span class="count">'+cards.length+'</span></div>';
  if(!cards.length) html+='<div class="empty">Nothing tracked yet — add a card above or from a listing builder.</div>';
  for(const g of ['riftbound','mtg','pokemon','swu']){
    const grp=cards.filter(c=>c.game===g);
    if(!grp.length)continue;
    html+='<div class="group-h">'+GAME_NAMES[g]+' ('+grp.length+')</div>'+grp.map(cardRow).join('');
  }
  allEl.innerHTML=html;
}

// ---- actions ----
async function refreshAll(btn){ const t=btn.textContent; btn.textContent='Refreshing…'; btn.disabled=true;
  try{ await api('/refresh',{method:'POST',headers:{'content-type':'application/json'},body:'{}'}); }catch(e){}
  btn.textContent=t; btn.disabled=false; load(); }
async function refreshOne(id,btn){ if(btn){btn.disabled=true;} try{ await api('/refresh',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id})}); }catch(e){} load(); }
async function removeCard(id,hard){ if(!hard&&!confirm('Remove from tracker?'))return; try{ await api('/watchlist/'+id+(hard?'?hard=1':''),{method:'DELETE'}); }catch(e){} load(); }
async function approve(id){ try{ await api('/watchlist/'+id,{method:'PATCH',headers:{'content-type':'application/json'},body:JSON.stringify({review_status:'ok'})}); }catch(e){} load(); }
async function ackSig(id){ try{ await api('/signals/'+id+'/ack',{method:'POST'}); }catch(e){} load(); }
async function quickAdd(btn){
  const game=document.getElementById('qa_game').value, key=document.getElementById('qa_key').value.trim(),
        name=document.getElementById('qa_name').value.trim(), variant=document.getElementById('qa_variant').value.trim();
  if(!key||!name){ alert('Need an identity key and a name.'); return; }
  btn.disabled=true;
  try{ await api('/watchlist',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({game,identity_key:key,name,variant})}); }catch(e){}
  document.getElementById('qa_key').value=''; document.getElementById('qa_name').value=''; document.getElementById('qa_variant').value='';
  btn.disabled=false; load();
}

if(window.TCG&&TCG.loadFx)TCG.loadFx();
load();
</script>
</body>
</html>
